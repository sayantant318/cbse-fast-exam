<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSE Fast Exam - Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{

width:380px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}

h1{

text-align:center;
margin-bottom:10px;
color:#0d47a1;

}

p{

text-align:center;
color:#666;
margin-bottom:25px;

}

input{

width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;

}

button{

width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#0d47a1;

}

#error{

color:red;
text-align:center;
margin-top:15px;

}

</style>

</head>

<body>

<div class="container">

<h1>CBSE Fast Exam</h1>

<p>Administrator Login</p>

<input
id="username"
placeholder="Admin Username">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">

Login

</button>

<div id="error"></div>

</div>

<script>

function login(){

const user=document.getElementById("username").value.trim();

const pass=document.getElementById("password").value.trim();

if(user==="admin" && pass==="cbse123"){

window.location.href="dashboard.html";

}else{

document.getElementById("error").innerHTML="Invalid Username or Password";

}

}

</script>

</body>
</html>
